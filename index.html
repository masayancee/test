<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;background:#f5f4f0;color:#222;min-height:100vh;}
header{background:#c1440e;color:#fff;padding:14px 28px;display:flex;align-items:center;gap:12px;}
header h1{font-size:17px;font-weight:500;}
header span{font-size:13px;opacity:.8;}
.app{max-width:900px;margin:0 auto;padding:28px 16px 60px;}
.tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab{padding:9px 24px;border:1.5px solid #c1440e;border-radius:6px;font-size:14px;cursor:pointer;background:#fff;color:#c1440e;font-family:inherit;transition:all .15s;}
.tab.active{background:#c1440e;color:#fff;}
.fsec{background:#fff;border:0.5px solid #e0d8d0;border-radius:10px;padding:20px;margin-bottom:12px;}
.slbl{font-size:11px;font-weight:500;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
.grow{display:grid;gap:10px;margin-bottom:10px;}
.c2{grid-template-columns:1fr 1fr;}
.c3{grid-template-columns:1fr 1fr 1fr;}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;font-size:14px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#222;font-family:inherit;outline:none;transition:border .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#c1440e;}
.field textarea{resize:vertical;min-height:72px;}
.itbl{width:100%;border-collapse:collapse;table-layout:fixed;}
.itbl th{background:#c1440e;color:#fff;font-size:13px;font-weight:500;padding:8px 10px;text-align:left;}
.itbl td{padding:6px 8px;border-bottom:0.5px solid #ece8e4;vertical-align:middle;}
.itbl td input,.itbl td select{width:100%;padding:5px 7px;font-size:13px;border:0.5px solid #ddd;border-radius:4px;background:#fff;color:#222;font-family:inherit;}
.add-r{font-size:13px;color:#c1440e;cursor:pointer;padding:10px 0;display:inline-block;}
.rm{color:#ccc;cursor:pointer;font-size:18px;border:none;background:none;padding:0 4px;line-height:1;}
.rm:hover{color:#c1440e;}
.totals-form{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-top:14px;}
.trf{display:flex;gap:16px;font-size:14px;}
.trf .l{color:#999;min-width:130px;text-align:right;}
.trf .v{min-width:110px;text-align:right;font-weight:500;color:#222;}
.trf.grand .l,.trf.grand .v{font-size:16px;color:#c1440e;}
.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn-p{background:#c1440e;color:#fff;border:none;border-radius:6px;padding:11px 28px;font-size:14px;cursor:pointer;font-family:inherit;}
.btn-p:hover{background:#a83a0c;}
.btn-s{background:#fff;color:#333;border:0.5px solid #ccc;border-radius:6px;padding:11px 28px;font-size:14px;cursor:pointer;font-family:inherit;}
.btn-s:hover{background:#f5f4f0;}
.notice{border-left:3px solid #c1440e;padding:10px 16px;background:#fef6f3;border-radius:0 6px 6px 0;font-size:13px;color:#666;margin-bottom:12px;}

/* preview */
#preview-area{display:none;background:#fff;border:0.5px solid #e0d8d0;border-radius:10px;padding:32px 40px;margin-top:16px;}
#preview-area.show{display:block;}
.prev-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid #e8e0d8;}
.prev-bar h2{font-size:15px;font-weight:500;}
.prev-bar-btns{display:flex;gap:8px;}

/* document */
.doc{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;color:#222;max-width:680px;margin:0 auto;}
.doc-title-bar{background:#c1440e;color:#fff;text-align:center;font-size:20px;font-weight:500;padding:10px;margin-bottom:22px;letter-spacing:.15em;}
.doc-meta{display:flex;justify-content:flex-end;gap:28px;margin-bottom:16px;}
.doc-meta-row{font-size:13px;}
.doc-meta-row span{display:inline-block;min-width:60px;color:#888;margin-right:4px;}
.doc-upper{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:28px;}
.doc-client{flex:1;}
.doc-client-name{font-size:20px;font-weight:500;margin-bottom:4px;}
.doc-client-sub{font-size:12px;color:#666;line-height:1.9;}
.doc-issuer{flex-shrink:0;min-width:200px;}
.doc-issuer-name{font-size:16px;font-weight:500;margin-bottom:6px;}
.doc-issuer-row{font-size:12px;color:#444;line-height:2;}
.doc-issuer-row span{display:inline-block;min-width:36px;color:#999;}
.doc-lead{font-size:13px;color:#333;margin-bottom:10px;}
.amount-box{border:1px solid #ccc;margin-bottom:18px;}
.amount-box-head{background:#c1440e;color:#fff;font-size:13px;text-align:center;padding:7px;}
.amount-box-body{text-align:right;font-size:28px;font-weight:500;padding:14px 18px;letter-spacing:.03em;}
.cond-tbl{border-collapse:collapse;margin-bottom:20px;}
.cond-tbl td{font-size:13px;padding:5px 12px;border:1px solid #ccc;}
.cond-tbl td:first-child{background:#c1440e;color:#fff;font-weight:500;white-space:nowrap;}
.doc-tbl{width:100%;border-collapse:collapse;margin-bottom:6px;table-layout:fixed;}
.doc-tbl th{background:#c1440e;color:#fff;font-size:12px;font-weight:500;padding:8px;text-align:left;}
.doc-tbl th.c{text-align:center;}
.doc-tbl th.r{text-align:right;}
.doc-tbl td{font-size:12px;padding:8px;border-bottom:1px solid #ece8e4;}
.doc-tbl td.c{text-align:center;}
.doc-tbl td.r{text-align:right;}
.doc-sum-wrap{display:flex;justify-content:flex-end;margin:10px 0 22px;}
.doc-sum{border-collapse:collapse;min-width:220px;}
.doc-sum td{font-size:13px;padding:7px 12px;text-align:right;border:1px solid #e0d8d0;}
.doc-sum td:first-child{background:#c1440e;color:#fff;font-weight:500;text-align:center;width:70px;border-color:#c1440e;}
.doc-sum tr:nth-child(2) td:first-child{background:#d4622a;border-color:#d4622a;}
.notes-head{background:#c1440e;color:#fff;font-size:13px;text-align:center;padding:7px;}
.notes-body{border:1px solid #ccc;border-top:none;min-height:70px;padding:12px 14px;}
.notes-body p{font-size:12px;color:#333;margin:3px 0;line-height:1.8;}

@media(max-width:600px){
  .c2,.c3{grid-template-columns:1fr;}
  header h1{font-size:15px;}
  #preview-area{padding:20px 16px;}
  .doc-upper{flex-direction:column;}
  .doc-issuer{min-width:unset;}
}
</style>

      <td>

          <option value="0">人材紹介手数料</option><option value="1" selected="">在留資格変更申請 ※行政書士依頼の実費</option><option value="2">在留資格更新申請 ※行政書士依頼の実費</option><option value="3">カスタム入力</option>

      <td style="text-align:center;font-size:13px;color:#888">式</td>
      <td><span style="display:block;text-align:right;font-size:13px">70,000</span></td>

<script>
const PRODS=[
  {name:"人材紹介手数料",unit:"式",price:150000},
  {name:"在留資格変更申請 ※行政書士依頼の実費",unit:"式",price:70000},
  {name:"在留資格更新申請 ※行政書士依頼の実費",unit:"式",price:40000},
  {name:"カスタム入力",unit:"式",price:0}
];
const ISS={name:"株式会社Tancee",zip:"〒107-0052",addr:"東京都港区赤坂2丁目21番4号",contact:"西 雅也"};
let items=[];

function init(){
  const t=new Date().toISOString().split("T")[0];
  document.getElementById("dd").value=t;
  document.getElementById("idate").value=t;
  const exp=new Date();exp.setDate(exp.getDate()+14);
  document.getElementById("dexp").value=exp.toISOString().split("T")[0];
  addItem(0,1);addItem(1,1);addItem(2,1);
}

function sw(m){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",m==="e"?i===0:i===1));
  document.getElementById("ev").style.display=m==="e"?"":"none";
  document.getElementById("iv").style.display=m==="i"?"":"none";
  closePreview();
}

function addItem(pi,qty){
  const id=Date.now()+Math.random();
  items.push({id,pi:pi!==undefined?pi:PRODS.length-1,qty:qty||1,cname:"",cprice:0});
  render();
}
function removeItem(id){items=items.filter(i=>i.id!==id);render();}

function render(){
  const tb=document.getElementById("ib");tb.innerHTML="";
  items.forEach(item=>{
    const p=PRODS[item.pi];
    const isC=item.pi===PRODS.length-1;
    const price=isC?item.cprice:p.price;
    const amt=price*item.qty;
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>
        <select onchange="chP(${item.id},this.value)">
          ${PRODS.map((pr,i)=>`<option value="${i}"${i===item.pi?" selected":""}>${pr.name}</option>`).join("")}
        </select>
        ${isC?`<input type="text" placeholder="品目名" value="${item.cname}" oninput="uCN(${item.id},this.value)" style="margin-top:5px;"/>`:""}
      </td>
      <td><input type="number" min="0" value="${item.qty}" style="text-align:center" onchange="uQ(${item.id},this.value)"/></td>
      <td style="text-align:center;font-size:13px;color:#888">${p.unit}</td>
      <td>${isC?`<input type="number" min="0" value="${item.cprice}" style="text-align:right" oninput="uCP(${item.id},this.value)"/>`:`<span style="display:block;text-align:right;font-size:13px">${p.price.toLocaleString()}</span>`}</td>
      <td style="text-align:right;font-size:13px">${amt>0?("¥"+amt.toLocaleString()):""}</td>
      <td><button class="rm" onclick="removeItem(${item.id})">×</button></td>`;
    tb.appendChild(tr);
  });
  calc();
}

function chP(id,v){items.find(i=>i.id===id).pi=parseInt(v);render();}
function uQ(id,v){items.find(i=>i.id===id).qty=parseFloat(v)||0;render();}
function uCN(id,v){items.find(i=>i.id===id).cname=v;}
function uCP(id,v){items.find(i=>i.id===id).cprice=parseFloat(v)||0;render();}

function calc(){
  let sub=0;
  items.forEach(item=>{const isC=item.pi===PRODS.length-1;sub+=(isC?item.cprice:PRODS[item.pi].price)*item.qty;});
  const tax=Math.round(sub*.1),total=sub+tax;
  document.getElementById("st").textContent="¥"+sub.toLocaleString();
  document.getElementById("tx").textContent="¥"+tax.toLocaleString();
  document.getElementById("tt").textContent="¥"+total.toLocaleString();
  return{sub,tax,total};
}

function getData(){
  const{sub,tax,total}=calc();
  const lines=items.map(item=>{
    const isC=item.pi===PRODS.length-1;
    const p=PRODS[item.pi];
    const name=isC?(item.cname||"（品目名）"):p.name;
    const price=isC?item.cprice:p.price;
    return{name,qty:item.qty,unit:p.unit,price,amt:price*item.qty};
  }).filter(l=>l.amt>0);
  return{
    cn:document.getElementById("cn").value||"（会社名）",
    cc:document.getElementById("cc").value,
    czip:document.getElementById("czip").value,
    caddr:document.getElementById("caddr").value,
    dd:document.getElementById("dd").value,
    dno:document.getElementById("dno").value,
    dexp:document.getElementById("dexp").value,
    due:document.getElementById("due").value,
    pay:document.getElementById("pay").value,
    notes:document.getElementById("notes").value,
    idate:document.getElementById("idate").value,
    idue:document.getElementById("idue").value,
    ino:document.getElementById("ino").value,
    sub,tax,total,lines
  };
}

function fd(s){if(!s)return"";const[y,m,d]=s.split("-");return`${y}/${m}/${d}`;}

function buildDoc(d,isInv){
  const dtype=isInv?"請求書":"見積書";
  const dateLabel=isInv?"請求日":"見積日";
  const noLabel=isInv?"請求番号":"見積番号";
  const dateVal=isInv?d.idate:d.dd;
  const noVal=isInv?d.ino:d.dno;
  const amtLabel=isInv?"ご請求金額（税込）":"お見積り金額（税込）";
  const leadText=isInv?"下記のとおり、ご請求申し上げます。":"下記の通り、お見積り申し上げます。";
  const conds=isInv
    ?[{l:"支払期限",v:fd(d.idue)},{l:"支払条件",v:d.pay}]
    :[{l:"納期",v:fd(d.due)},{l:"支払条件",v:d.pay},{l:"有効期限",v:fd(d.dexp)}];

  const empty=Math.max(0,8-d.lines.length);
  const emptyRows=Array.from({length:empty}).map(()=>`<tr><td style="padding:8px">&nbsp;</td><td></td><td></td><td></td><td></td></tr>`).join("");
  const dataRows=d.lines.map(l=>`<tr>
    <td>${l.name}</td>
    <td class="c">${l.qty}</td>
    <td class="c">${l.unit}</td>
    <td class="r">¥${l.price.toLocaleString()}</td>
    <td class="r">¥${l.amt.toLocaleString()}</td>
  </tr>`).join("");
  const notesHTML=d.notes.split("\n").map(l=>`<p>${l||"&nbsp;"}</p>`).join("");

  return`<div class="doc">
    <div class="doc-title-bar">${dtype}</div>
    <div class="doc-meta">
      <div class="doc-meta-row"><span>${dateLabel}</span>${fd(dateVal)}</div>
      <div class="doc-meta-row"><span>${noLabel}</span>${noVal}</div>
    </div>
    <div class="doc-upper">
      <div class="doc-client">
        <div class="doc-client-name">${d.cn} 御中</div>
        <div class="doc-client-sub">${d.czip?d.czip+"<br>":""}${d.caddr||""}</div>
        <br>
        <div class="doc-lead">${leadText}</div>
        <div class="amount-box">
          <div class="amount-box-head">${amtLabel}</div>
          <div class="amount-box-body">¥${d.total.toLocaleString()}</div>
        </div>
        <table class="cond-tbl">
          ${conds.map(r=>`<tr><td>${r.l}</td><td style="min-width:180px">${r.v}</td></tr>`).join("")}
        </table>
      </div>
      <div class="doc-issuer">
        <div class="doc-issuer-name">${ISS.name}</div>
        <div class="doc-issuer-row">${ISS.zip}</div>
        <div class="doc-issuer-row"><span>住所：</span>${ISS.addr}</div>
        <div class="doc-issuer-row" style="margin-top:4px"><span>担当：</span>${ISS.contact}</div>
      </div>
    </div>
    <table class="doc-tbl">
      <thead><tr>
        <th style="width:45%">内容</th>
        <th class="c" style="width:9%">数量</th>
        <th class="c" style="width:9%">単位</th>
        <th class="r" style="width:18%">単価（税抜）</th>
        <th class="r" style="width:19%">金額（税抜）</th>
      </tr></thead>
      <tbody>${dataRows}${emptyRows}</tbody>
    </table>
    <div class="doc-sum-wrap">
      <table class="doc-sum">
        <tr><td>小計</td><td>¥${d.sub.toLocaleString()}</td></tr>
        <tr><td>消費税</td><td>¥${d.tax.toLocaleString()}</td></tr>
        <tr><td>合計</td><td style="font-weight:500">¥${d.total.toLocaleString()}</td></tr>
      </table>
    </div>
    <div class="notes-head">備考</div>
    <div class="notes-body">${notesHTML}</div>
  </div>`;
}

function prev(isInv){
  const d=getData();
  document.getElementById("prev-title").textContent=isInv?"請求書プレビュー":"見積書プレビュー";
  document.getElementById("prev-content").innerHTML=buildDoc(d,isInv);
  document.getElementById("print-btn").onclick=()=>printD(isInv);
  const area=document.getElementById("preview-area");
  area.classList.add("show");
  setTimeout(()=>area.scrollIntoView({behavior:"smooth",block:"start"}),50);
}

function closePreview(){document.getElementById("preview-area").classList.remove("show");}

function printD(isInv){
  const d=getData();
  const html=buildDoc(d,isInv);
  const dtype=isInv?"請求書":"見積書";
  const w=window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>${dtype}</title><style>${PRINT_CSS}</style></head><body>${html}<script>window.onload=function(){window.print();}<\/script></body></html>`);
  w.document.close();
}

init();
</script>
