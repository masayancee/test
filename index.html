<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Alarm App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Alarm App</h1>

        <div class="clock">
            <div id="currentTime">00:00:00</div>
        </div>

        <div class="alarm-set">
            <h2>Set Alarm</h2>
            <div class="input-group">
                <input type="number" id="hours" min="0" max="23" value="07" placeholder="Hours">
                <span>:</span>
                <input type="number" id="minutes" min="0" max="59" value="00" placeholder="Minutes">
            </div>

            <button id="setBtn" class="btn btn-set">Set Alarm</button>
            <button id="cancelBtn" class="btn btn-cancel" disabled>Cancel Alarm</button>
        </div>

        <div id="alarmStatus" class="status"></div>
    </div>

    <audio id="alarmSound">
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <script src="script.js"></script>
</body>
</html>
