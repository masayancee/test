<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>近くの図書館検索</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 近くの図書館検索</h1>

        <div class="location-section">
            <div class="location-display">
                <span id="locationText">位置情報を取得中...</span>
            </div>
            <button id="getLocationBtn" class="btn btn-primary">📍 現在地を取得</button>
        </div>

        <div id="librariesContainer" class="libraries-container">
            <p id="noLibraries" class="info-text">位置情報を取得して図書館を検索してください</p>
        </div>

        <p id="errorText" class="error-text"></p>
        <p id="loadingText" class="loading-text" style="display: none;">検索中...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
