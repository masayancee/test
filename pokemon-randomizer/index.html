<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモン ランダム表示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎲 ランダムポケモン</h1>

        <div class="pokemon-card">
            <div class="pokemon-image">
                <img id="pokemonImage" src="" alt="ポケモン画像" />
            </div>

            <div class="pokemon-info">
                <h2 id="pokemonName">-</h2>
                <p id="pokemonId" class="pokemon-id">ID: -</p>

                <div class="pokemon-types">
                    <span id="typesContainer"></span>
                </div>

                <div class="pokemon-stats">
                    <div class="stat">
                        <span class="stat-label">高さ</span>
                        <span id="pokemonHeight">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">重さ</span>
                        <span id="pokemonWeight">-</span>
                    </div>
                </div>
            </div>
        </div>

        <button id="randomBtn" class="btn-random">ランダムに表示 🎲</button>
        <p id="loading" class="loading" style="display: none;">読み込み中...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
